version: 2

updates:
  - package-ecosystem: nuget
    directory: "/src"
    open-pull-requests-limit: 10
    schedule:
      interval: daily
      time: '10:30'
      timezone: 'Europe/London'
    ignore:
      # Should we update the target framework of projects in the future, these
      # ignores will also need to change
      - dependency-name: "Azure.Extensions.AspNetCore.Configuration.Secrets"
        versions: [">=1.5.0"]
      - dependency-name: "Azure.Identity"
        versions: [">=1.18.0"]
      - dependency-name: "Azure.Security.KeyVault.Secrets"
        versions: [">=4.9.0"]
      - dependency-name: "Azure.Storage.Blobs"
        versions: [">=12.27.0"]
      - dependency-name: "coverlet.*"
        versions: [">=8.0.0"]
      - dependency-name: "Microsoft.ApplicationInsights*"
        versions: [">=3.0.0"]
      - dependency-name: "Microsoft.Azure.Functions.Worker*"
        versions: [">=2.0.0"]
      - dependency-name: "Microsoft.Extensions.Azure"
        versions: [">=1.14.0"]
      - dependency-name: "Microsoft.Extensions*"
        versions: [">=9.0.0"]
      - dependency-name: "System.Configuration.ConfigurationManager"
        versions: [">=9.0.0"]
      - dependency-name: "System.Threading.RateLimiting"
        versions: [">=9.0.0"]
    groups:
      # Group all patch updates into a single PR
      patch-updates:
        applies-to: version-updates
        update-types:
          - 'patch'
      # Minor updates will be created individually (ungrouped)
      # Major updates will be created individually (ungrouped)
      # No specific configuration needed for major updates as they'll be handled separately
